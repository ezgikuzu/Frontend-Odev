<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div id="box" class="bg-white p-8 rounded-xl shadow text-center transition-colors duration-300">
        <h1 class="text-4xl font-bold text-red-300 my-4 mb-2">Canlı Sayaç</h1>
        <div id="number" class="text-4xl text-blue-300 my-4">0</div>
        <div class="flex gap-4 justify-center">
            <button onclick="change(-1)" class="bg-red-500 text-white px-4 rounded font-bold">-</button>
            <button onclick="change(1)" class="bg-green-500 text-white px-4 rounded font-bold">+</button>
        </div>
    </div>
   <script>
    let count = 0;

    const box = document.getElementById("box");
    const number = document.getElementById("number");

    function change(e) {
        count += e;
        number.textContent = count;

        let colorClass = "bg-white";

        if (count > 0) {
            if (count <= 1) {
                colorClass = "bg-green-100";
            } else if (count <= 5) {
                colorClass = "bg-green-300";
            } else if (count <= 8) {
                colorClass = "bg-green-500";
            } else {
                colorClass = "bg-green-700";
            }
        } else if (count < 0) {
            if (count >= -2) {
                colorClass = "bg-red-100";
            } else if (count >= -5) {
                colorClass = "bg-red-300";
            } else if (count >= -8) {
                colorClass = "bg-red-500";
            } else {
                colorClass = "bg-red-700";
            }
        }

        box.className = `${colorClass} p-8 rounded-xl shadow text-center transition-colors duration-300`;
    }
</script>
</body>
</html>
