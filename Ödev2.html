<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Etkinlik Planlayıcı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
</head>

<body class="bg-gray-100 p-6">

    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-6">

        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-3xl font-bold text-purple-700">Etkinlik Planlayıcı</h1>
            </div>

            <button id="btn-theme" class="bg-purple-600 text-white px-4 py-2 rounded">
                Tema Değiştir
            </button>
        </div>

        <!-- LOGIN -->
        <div class="p-4 border rounded-lg mb-5">
            <h2 class="text-xl font-bold text-gray-700 mb-3">1. Giriş Kontrolü</h2>

            <input id="username" type="text" placeholder="Kullanıcı adı: admin" class="border p-2 rounded mb-2">
            <input id="password" type="password" placeholder="Şifre: 1234" class="border p-2 rounded mb-2">

            <button id="btn-login" class="bg-green-500 text-white px-4 py-2 rounded">
                Giriş Yap
            </button>

            <p id="login-result" class="mt-3 font-semibold text-gray-700">
                Henüz giriş yapılmadı.
            </p>
        </div>

        <!-- ETKİNLİK EKLEME -->
        <div class="p-4 border rounded-lg mb-5">
            <h2 class="text-xl font-bold text-blue-700 mb-3">2. Etkinlik Ekle</h2>

            <div class="grid md:grid-cols-4 gap-3">
                <input id="event-name" type="text" placeholder="Etkinlik adı" class="border p-2 rounded">
                <input id="event-category" type="text" placeholder="Kategori" class="border p-2 rounded">
                <input id="event-price" type="number" placeholder="Bütçe TL" class="border p-2 rounded">

                <button id="btn-add-event" class="bg-blue-500 text-white px-4 py-2 rounded">
                    Ekle
                </button>
            </div>

            <p id="add-result" class="mt-3 font-semibold"></p>
        </div>

        <!-- ARAMA VE FİLTRE -->
        <div class="p-4 border rounded-lg mb-5">
            <h2 class="text-xl font-bold text-pink-700 mb-3">3. Etkinlik Ara</h2>

            <input id="search-input" type="text" placeholder="Etkinlik adı ara..." class="border p-2 rounded w-full mb-3">

            <button id="btn-search" class="bg-pink-500 text-white px-4 py-2 rounded">
                Ara
            </button>

            <button id="btn-show-all" class="bg-gray-500 text-white px-4 py-2 rounded">
                Tümünü Göster
            </button>
        </div>

        <div class="p-4 border rounded-lg mb-5">
            <h2 class="text-xl font-bold text-indigo-700 mb-3">4. Etkinlik Listesi</h2>

            <div id="event-list" class="space-y-2">
                <p class="text-gray-500">Henüz etkinlik yok.</p>
            </div>

            <div class="mt-4 p-3 bg-gray-100 rounded">
                <p class="font-bold">Toplam Bütçe: <span id="total-budget">0</span> TL</p>
                <p class="font-bold">Etkinlik Sayısı: <span id="event-count">0</span></p>
            </div>
        </div>

        <!-- İNDİRİM -->
        <div class="p-4 border rounded-lg mb-5">
            <h2 class="text-xl font-bold text-yellow-700 mb-3">5. İndirim Hesaplama</h2>

            <input id="discount-input" type="number" placeholder="İndirim yüzdesi örn: 20" class="border p-2 rounded">

            <button id="btn-discount" class="bg-yellow-500 text-white px-4 py-2 rounded">
                İndirim Uygula
            </button>

            <p id="discount-result" class="mt-3 font-semibold"></p>
        </div>

        <!-- SAYAÇ -->
        <div class="p-4 border rounded-lg mb-5">
            <h2 class="text-xl font-bold text-red-700 mb-3">6. Etkinlik Geri Sayacı</h2>

            <p class="mb-2">
                Sayaç: <span id="timer" class="font-bold">0</span>
            </p>

            <button id="btn-start" class="bg-red-500 text-white px-4 py-2 rounded">
                Başlat
            </button>

            <button id="btn-stop" class="bg-gray-700 text-white px-4 py-2 rounded">
                Durdur
            </button>
        </div>

        <!-- ASYNC -->
        <div class="p-4 border rounded-lg">
            <h2 class="text-xl font-bold text-green-700 mb-3">7. Etkinlik Onay Süreci</h2>

            <button id="btn-confirm" class="bg-green-600 text-white px-4 py-2 rounded">
                Etkinlikleri Onayla
            </button>

            <pre id="confirm-result" class="mt-3 bg-gray-100 p-3 rounded whitespace-pre-wrap">Onay sonucu burada görünecek.</pre>
        </div>

    </div>

    <script>

        let etkinlikler = [
            { id: 1, ad: "Frontend Çalışması", kategori: "Eğitim", butce: 0 },
            { id: 2, ad: "Kahve Buluşması", kategori: "Sosyal", butce: 250 },
            { id: 3, ad: "Kitap Fuarı", kategori: "Kültür", butce: 500 }
        ];

        let karanlikTema = false;
        let sayac = 0;
        let intervalId = null;

        // classList
        document.getElementById("btn-theme").addEventListener("click", () => {
            karanlikTema = !karanlikTema;

            if (karanlikTema) {
                document.body.classList.remove("bg-gray-100");
                document.body.classList.add("bg-gray-800");
            } else {
                document.body.classList.remove("bg-gray-800");
                document.body.classList.add("bg-gray-100");
            }
        });

        // Promise, then, catch
        const girisKontrol = (username, password) => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (username === "admin" && password === "1234") {
                        resolve("Giriş başarılı. Etkinlik paneline hoş geldin.");
                    } else {
                        reject("Kullanıcı adı veya şifre yanlış.");
                    }
                }, 700);
            });
        };

        document.getElementById("btn-login").addEventListener("click", () => {
            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const sonuc = document.getElementById("login-result");

            sonuc.innerText = "Giriş kontrol ediliyor...";

            girisKontrol(username, password)
                .then((mesaj) => {
                    sonuc.className = "mt-3 font-semibold text-green-600";
                    sonuc.innerText = mesaj;
                })
                .catch((hata) => {
                    sonuc.className = "mt-3 font-semibold text-red-600";
                    sonuc.innerText = hata;
                });
        });

        // map, join, reduce

        const etkinlikleriGoster = (liste = etkinlikler) => {
            const eventList = document.getElementById("event-list");
            const totalBudget = document.getElementById("total-budget");
            const eventCount = document.getElementById("event-count");

            if (liste.length === 0) {
                eventList.innerHTML = `<p class="text-red-500">Etkinlik bulunamadı.</p>`;
            } else {
                const html = liste.map((etkinlik) => {
                    return `
                        <div class="p-3 border rounded bg-gray-50 flex justify-between items-center">
                            <div>
                                <strong>${etkinlik.ad}</strong>
                                <p class="text-sm text-gray-500">${etkinlik.kategori}</p>
                            </div>

                            <div class="text-right">
                                <p class="font-bold">${etkinlik.butce} TL</p>
                                <button onclick="etkinlikBul(${etkinlik.id})" class="text-xs bg-purple-500 text-white px-2 py-1 rounded">
                                    Detay
                                </button>
                            </div>
                        </div>
                    `;
                }).join("");

                eventList.innerHTML = html;
            }

            const toplam = etkinlikler.reduce((toplam, etkinlik) => {
                return toplam + etkinlik.butce;
            }, 0);

            totalBudget.innerText = toplam;
            eventCount.innerText = etkinlikler.length;
        };

        // push, trim, parseFloat
        document.getElementById("btn-add-event").addEventListener("click", () => {
            const ad = document.getElementById("event-name").value.trim();
            const kategori = document.getElementById("event-category").value.trim();
            const butce = parseFloat(document.getElementById("event-price").value) || 0;
            const sonuc = document.getElementById("add-result");

            if (ad === "" || kategori === "") {
                sonuc.className = "mt-3 font-semibold text-red-600";
                sonuc.innerText = "Etkinlik adı ve kategori boş bırakılamaz.";
                return;
            }

            const yeniEtkinlik = {
                id: Date.now(),
                ad: ad,
                kategori: kategori,
                butce: butce
            };

            etkinlikler.push(yeniEtkinlik);

            sonuc.className = "mt-3 font-semibold text-green-600";
            sonuc.innerText = "Etkinlik başarıyla eklendi.";

            document.getElementById("event-name").value = "";
            document.getElementById("event-category").value = "";
            document.getElementById("event-price").value = "";

            etkinlikleriGoster();
        });

        // filter, includes, toLowerCase

        document.getElementById("btn-search").addEventListener("click", () => {
            const arama = document.getElementById("search-input").value.toLowerCase().trim();

            const filtrelenmis = etkinlikler.filter((etkinlik) => {
                return etkinlik.ad.toLowerCase().includes(arama);
            });

            etkinlikleriGoster(filtrelenmis);
        });

        document.getElementById("btn-show-all").addEventListener("click", () => {
            document.getElementById("search-input").value = "";
            etkinlikleriGoster();
        });

        // find

        function etkinlikBul(id) {
            const bulunanEtkinlik = etkinlikler.find((etkinlik) => {
                return etkinlik.id === id;
            });

            alert(
                "Etkinlik: " + bulunanEtkinlik.ad +
                "\nKategori: " + bulunanEtkinlik.kategori +
                "\nBütçe: " + bulunanEtkinlik.butce + " TL"
            );
        }

        // rest, spread

        const indirimliToplamHesapla = (indirimOrani, ...butceler) => {
            const toplam = butceler.reduce((a, b) => a + b, 0);
            const indirim = toplam * indirimOrani / 100;

            return toplam - indirim;
        };

        document.getElementById("btn-discount").addEventListener("click", () => {
            const oran = parseFloat(document.getElementById("discount-input").value) || 0;

            const butceler = etkinlikler.map((etkinlik) => etkinlik.butce);

            const sonuc = indirimliToplamHesapla(oran, ...butceler);

            document.getElementById("discount-result").innerText =
                "%" + oran + " indirimli toplam bütçe: " + sonuc + " TL";
        });

        // setInterval, clearInterval

        document.getElementById("btn-start").addEventListener("click", () => {
            if (intervalId !== null) {
                return;
            }

            intervalId = setInterval(() => {
                sayac++;
                document.getElementById("timer").innerText = sayac;
            }, 1000);
        });

        document.getElementById("btn-stop").addEventListener("click", () => {
            clearInterval(intervalId);
            intervalId = null;
        });

        // ASYNC / AWAIT

        const etkinlikleriKontrolEt = () => {
            return new Promise((resolve, reject) => {
                setTimeout(() => {
                    if (etkinlikler.length > 0) {
                        resolve("Etkinlik listesi kontrol edildi.");
                    } else {
                        reject("Onaylanacak etkinlik bulunamadı.");
                    }
                }, 1000);
            });
        };

        const butceyiKontrolEt = () => {
            return new Promise((resolve) => {
                setTimeout(() => {
                    const toplam = etkinlikler.reduce((a, b) => a + b.butce, 0);
                    resolve("Toplam bütçe hesaplandı: " + toplam + " TL");
                }, 1000);
            });
        };

        const onayla = () => {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve("Etkinlik planı başarıyla onaylandı.");
                }, 1000);
            });
        };

        document.getElementById("btn-confirm").addEventListener("click", async () => {
            const output = document.getElementById("confirm-result");

            output.innerText = "Onay süreci başladı...";

            try {
                const kontrol = await etkinlikleriKontrolEt();
                output.innerText = kontrol + "\nBütçe kontrol ediliyor...";

                const butce = await butceyiKontrolEt();
                output.innerText = kontrol + "\n" + butce + "\nSon onay bekleniyor...";

                const sonuc = await onayla();
                output.innerText = kontrol + "\n" + butce + "\n" + sonuc;

            } catch (hata) {
                output.innerText = hata;
            }
        });

        etkinlikleriGoster();
    </script>

</body>
</html>
