<!DOCTYPE html>
<html lang="en">  <!-- HTML sayfasının başlangıç etiketidir ve sayfanın dili buradan ayarlanır.  -->
<head>
    <meta charset="UTF-8"> <!-- Türkçe karakterlerin düzgün görünmesi için kullanılır.  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- **Oluşturulan sayfanın responsive olması için kullanılır. 
    ** width=device-width bu kısım satfabın genişliğinin kullanılan cihazın ekranına göre ayarlanmasını sağlar.
    ** initial-scale=1.0 bu kısım ise yaklaştırma oranı ile ilgilidir. -->
    <title>Document</title> <!-- Sayfanın başlığı -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"> <!-- HTML dosyasına tailwind css kütüphanesini eklememizi sağlar. -->
</head>
<body class="bg-indigo-50 text-gray-800 font-sans min-h-screen p-8 flex flex-col items-center justify-center gap-6"> <!-- body, sayfanın ana kısmıdır. 
    ** bg-indigo-50 , bu sayfanın arka plan rengini belirler. 
    ** text-gray-800 , bu sayfanın metin rengini belirler. 
    ** font-sans , bu sayfanın yazı tipini belirler. 
    ** min-h-screen , Body'nin min yüksekliğini ekran yüksekliği kadar yapar.
    ** p-8 , bu sayfanın içeriğinin kenar boşluklarını belirler.
    ** flex , bunun görevi bod'yi flex container yapar. bu sayede, yan yana dizme, alt alta dizme gibi işlemler yapılabilir. 
    ** flex-col , flex içindeki elemanları alt alta dizmek için kullanılır.
    ** items-center, flex içindeki elemanları yatayda ortalamak için kullanılır.
    ** justify-center , flex içine yazdığımız elemanları dikeyde ortalamak için kullanılır.
    ** gap-6 , bu sayfanın içeriğinin elemanları arasındaki boşlukları belirler. -->
    <div class="text-center max-w-md"> <!-- div'i bir kutu oluşturmak için kullandık. 
        ** text-center, div içindeki metinleri ortalamak için kullanıldı. 
        ** max-w-md, divin maksimum genişliğini belirledik.  -->
        <div>
            <h2 class="text-xl font-bold text-gray-900 mb-2"> <!-- h2, başlık etiketidir.
                ** text-xl, yazı boyutunu ayarlar.
                ** font-bold, yazıyı kalın yapar. 
                ** text-gray-900, yazı rengini belirledik. 
                ** mb-2, alt taraftan boşluk verdik. -->
                Fiyatlandırma Kartı Flex Column
            </h2>
            <p class="text-xs text-gray-500">Kart elemanları üst üste sıralamak için flex-col, öne çıkan rozeti en üstte göstermek için order-first sınıfı kullanacağız</p><!-- p paragraf etiketidir.
            ** text-xs, yazı boyutunu ayarladık. 
            ** text-gray-500, yazı rengini belirledik. -->
        </div>
    
    <div class="w-full max-w-xs bg-white border border-gray-200 rounded-2xl p-6 flex flex-col gap-4 shadow-sm">
    <div><!-- tekrardan bir div (bölüm/kutu) açtık.
    ** w-full, divin genişliğini bulunduğu alan kadar yapar.
    ** max-w-xs, div çok fazla büyümesin diye max genişlik belirledik.
    ** w-full ve max-w-xs ikisi birlikte şu anlama gelir küçük ekranlarda alanı doldur, büyük ekranlarda max genişlikte kal fazla genişleme demek.
    ** bg-white, divin arka plan rengini belirledik. 
    ** border, divin kenarlıklarını belirledik. 
    ** border-gray-200, divin kenarlıklarının rengini belirledik. 
    ** rounded-2xl, divin kenarlarının yuvarlaklaşmasını sağladık. 
    ** p-6, divin kenar boşluklarını belirledik.
    ** flex, divi flex container yaptık. 
    ** flex-col, flex içindeki elemanları alt alta dizdik. 
    ** gap-4, sayfadaki elemanlar arasındaki boşlukları belirledik. yani alt alta gelen içerikler atrasında boşluklar belirlendi. 
    ** shodow-sm, dive hafif bir gölge ekledik.
     -->
        <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wider">Standart Paket </h2> <!-- yine h2 başlık etiketi kullandık. 
        ** text-sm, yazı boytunu belirledik. 
        ** font-bold, yazıyı kalın yaptık. 
        ** text-gray-800, yazı rengini belirledik. 
        ** upparcase, yazıyı tamamen büyük harfle yazılmasını sağladık. 
        ** tracking-wider, harfler arasındaki boşluğu artırduk. -->
        <p class="text-2xl font-extrabold text-gray-900 mt-1">99 TL/Ay</p> <!-- 
        ** text-2xl , yazı boyutunu ayarladık.
        ** font-extrabold, yazıyı en kalın yaotık. 
        ** text-gray-900, yazı rengini belirledik. 
        ** mt-1 , üst taraftan boşluk verdik.  -->
    </div>
        <div class="px-2.5 py-1 bg-indigo-100 border border-indigo-200 text-indigo-700 text-[9px] font-extrabold rounded-full self-start order-first uppercase tracking-wide"> <!-- ** px-2.5, sağdan ve soldan x ekseninde iç boşluk verdik. 
        ** py-1 , üstten ve alttan y ekseninde boşluk verdik.
        ** bg-indigo-100, arka plan rengini değiştirdik. 
        ** text-indigo-7**, yazı rengini değiştirdik. 
        ** text-[9px], burada yazı boyutunu özel olarak ayarladık. 
        ** font-extrabold, yazı fontunu en kalın yaptık. 
        ** rounded-full, köşeleri tamamen yuvarlak yaptık. 
        ** self-start, bunu oluşturduğumuz dizin kendi kadar genişliğini alır ve sola hizalar. yani başta durmasını sağlar. 
        ** order-first, elemanın soralamada en üstte ilk kalmasını sağlar. 
        ** uppercase, yazının tamamen büyük harfle yazılmasını sğalar.
        ** tracking-wide,  harflerinin arasına tracking-wider kadar olmasada hafif aralık verir.  -->
            En Popüler Paket(order-first)
        </div>
        <div class="text-xs text-gray-500 space-y-2 border border-gray-100 pt-4 "><!-- 
        ** text-xs, yazı boyutunu belirledik. 
        ** text-gray-500, yazı rengini belirledik. 
        ** space-y-2, div içindki elemanların arasına dikey boşluk verdik. 
        ** border, div'e sınır belirledik. 
        ** border-gray-100, div sınrılarına renk belirledik. 
        ** pt-4, üstten i. boşluk verdik . -->
            <p>1 Sınırsız Proje</p>
            <p>25 tane kişisel proje</p>
            <p>Grup Çalışması</p>

        </div>
        <button class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-semibold transition-colors mt-2">Satın Al</button><!-- 
        ** w-full, butonu bulunduğu alanın tamamı kadar yaptık. 
        ** py-2, butonun üstünden ve altından iç boşluk verdik. 
        ** bg-indigo-600, butonun arka plan rengini belirledik.
        ** hover:bg-indigo-700, butonun üzerine gelindiğinde arka plan rengini belirledik. 
        ** text-white, buton içindeki yazı rengini seçtik. 
        ** rounded-lg, buton kenarlarını large olucak şekilde yuvarladık. 
        ** font-semibold, yazı fontunu semibold yaptık. 
        ** transition-colors, renk geçişini ayarldık. 
        ** mt-2, butonun üstüne boşluk verdik.   -->
    </div>
    </div>
</body>
</html>
</html>
